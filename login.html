<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athena - Acceso Bibliotecario</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            /* Paleta "Dark Academia" Consistente */
            --bg-main: #1a1614;
            --bg-panel: #26211e;
            --accent-gold: #c5a059;
            --text-main: #eaddcf;
            --text-muted: #8c857b;
            --btn-primary: #8f5b34;
            --btn-hover: #a67c52;     
            --input-bg: #120f0e;
            --border-color: #3e3632;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Lato', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #2a221c 0%, #1a1614 100%);
            margin: 0;
        }

        h1, h2, h3, .brand-font {
            font-family: 'Playfair Display', serif;
        }

        .login-card {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-top: 4px solid var(--accent-gold);
            padding: 3rem;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        .login-icon {
            font-size: 3rem;
            color: var(--accent-gold);
            margin-bottom: 1rem;
        }

        /* Inputs y Formularios */
        .form-control {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.75rem;
        }

        .form-control:focus {
            background-color: #1a1614;
            border-color: var(--accent-gold);
            color: #fff;
            box-shadow: 0 0 0 0.25rem rgba(197, 160, 89, 0.2);
        }

        .form-label {
            color: var(--accent-gold);
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        .btn-gold {
            background-color: var(--accent-gold);
            color: #1a1614;
            font-weight: 700;
            border: none;
            transition: all 0.3s;
        }
        .btn-gold:hover {
            background-color: #dccba4;
            color: #1a1614;
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-icon">
            <i class="bi bi-book-half"></i>
        </div>
        <h2 class="mb-4">Athena Library</h2>
        <p class="text-muted mb-4">Acceso exclusivo para bibliotecarios</p>
        
        <form onsubmit="intentarLogin(event)">
            <div class="mb-3 text-start">
                <label for="username" class="form-label">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username" placeholder="admin" required>
                </div>
            </div>
            <div class="mb-4 text-start">
                <label for="password" class="form-label">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-key"></i></span>
                    <input type="password" class="form-control" id="password" placeholder="1234" required>
                </div>
            </div>
            
            <div id="login-error" class="alert alert-danger d-none py-2 text-small mb-3" role="alert" style="font-size: 0.9em;">
                <i class="bi bi-exclamation-circle me-2"></i> Credenciales incorrectas
            </div>
            
            <button type="submit" class="btn btn-gold w-100 py-2">Ingresar al Sistema</button>
        </form>
        
        <div class="mt-4 text-muted small">
            &copy; 2025 Sistema Bibliotecario
        </div>
    </div>

    <script>
        // Verificar si ya está logueado al cargar
        document.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('athena_auth') === 'true') {
                window.location.href = 'index.html';
            }
        });

        function intentarLogin(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('login-error');

            // Credenciales simuladas
            if(user === 'admin' && pass === '1234') {
                // Guardar sesión
                localStorage.setItem('athena_auth', 'true');
                
                // Redirigir al Dashboard
                window.location.href = 'index.html';
            } else {
                errorMsg.classList.remove('d-none');
                
                // Animación de error (vibración)
                document.querySelector('.login-card').animate([
                    { transform: 'translateX(0)' },
                    { transform: 'translateX(-5px)' },
                    { transform: 'translateX(5px)' },
                    { transform: 'translateX(0)' }
                ], { duration: 300 });
            }
        }
    </script>
</body>
</html>
